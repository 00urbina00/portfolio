server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    autoindex off;

    # Portfolio solo necesita GET y HEAD
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # Bloquear archivos y carpetas ocultas
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear archivos sensibles por nombre
    location ~* ^/(wp-config\.php|docker-compose\.ya?ml|terraform\.tfstate|backup\.sql|dump\.sql|database\.sql|config/.*\.php)$ {
        return 404;
    }

    # Bloquear extensiones que no debe servir una aplicación Astro estática
    location ~* \.(php|phtml|phar|sql|bak|backup|old|orig|save|swp|dist|env)$ {
        return 404;
    }

    # Healthcheck del contenedor
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Assets, rutas generadas y fallback SPA de Astro
    location / {
        try_files $uri $uri/ /index.html;
    }
}